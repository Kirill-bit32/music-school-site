<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админ‑панель — Музыкальная школа</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="navbar">
    <div class="logo">
      <div class="logo-circle">M</div>
      <div class="logo-text">Music School</div>
    </div>
    <div class="mobile-menu" data-mobile-menu>
  <a href="index.html">Главная</a>
  <a href="directions.html">Направления</a>
  <a href="trial.html">Пробный урок</a>
  <a href="profile.html">Профиль</a>
</div>
    <div class="nav-center">
      <nav class="nav-links">
        <a href="index.html">Главная</a>
        <a href="directions.html">Направления</a>
        <a href="trial.html">Пробный урок</a>
        <a href="profile.html">Профиль</a>
      </nav>
    </div>
    <div class="nav-right">
      <button class="mobile-menu-btn" data-mobile-menu-btn>☰</button>
      <div class="theme-toggle" data-theme-toggle>
        <span class="theme-toggle-icon">🌓</span>
        <span data-theme-label>Тёмная</span>
      </div>
      <div class="profile-menu-wrapper" data-profile-wrapper>
        <button type="button" class="profile-avatar-btn" data-profile-avatar style="display:none;">U</button>
        <a href="auth.html" class="btn btn-outline" data-login-btn>Войти</a>
        <div class="profile-menu" data-profile-menu>
          <div class="profile-menu-header" data-profile-menu-header>Привет!</div>
          <div class="profile-menu-item" data-menu-profile>Профиль</div>
          <div class="profile-menu-item" data-menu-admin style="display:none;">Админ‑панель</div>
          <div class="profile-menu-item" data-menu-logout>Выйти</div>
        </div>
      </div>
    </div>
  </div>
</header>

<main>
  <section class="section">
    <h1 class="hero-title">Админ‑панель</h1>
    <p class="section-subtitle">Управление заявками на пробные уроки.</p>

    <div class="admin-filters">
      <span class="admin-badge">Всего: <span id="adminTotal">0</span></span>
      <span class="admin-badge">Новые: <span id="adminNew">0</span></span>
      <span class="admin-badge">Обработанные: <span id="adminDone">0</span></span>
      <span id="adminBell" class="admin-badge" style="display:none;">🔔 Новые заявки</span>
    </div>

    <div class="admin-filter-row">
      <input type="text" class="form-input" id="adminSearch" placeholder="Поиск">
      <select class="form-select" id="adminStatusFilter">
        <option value="all">Все статусы</option>
        <option value="new">Новые</option>
        <option value="callback">Перезвонить</option>
        <option value="noanswer">Не дозвонились</option>
        <option value="confirmed">Подтверждено</option>
        <option value="cancelled">Отменено</option>
        <option value="done">Обработанные</option>
      </select>
      <select class="form-select" id="adminDirectionFilter">
        <option value="all">Все направления</option>
        <option>Фортепиано</option>
        <option>Эстрадный вокал</option>
        <option>Гитара</option>
        <option>Сольфеджио / теория</option>
        <option>Детская программа</option>
        <option>Барабаны</option>
        <option>Скрипка</option>
        <option>Электронная музыка</option>
      </select>
      <button class="btn btn-outline" id="adminClearFilters">Сбросить</button>
      <button class="btn btn-outline" id="adminClearAll">Очистить все</button>
    </div>

    <div id="adminContent" class="cards-grid">Загрузка...</div>
  </section>
</main>

<footer>
  <div class="footer-inner">
    <span>© Музыкальная школа, 2026</span>
  </div>
</footer>

<div class="toast-container" id="toastContainer"></div>

<script type="module" src="script.js"></script>
</body>
</html>
